# English content (default language)
[[mounts]]
  source = "content/english"
  target = "content"
  lang = "en"

# Spanish content
[[mounts]]
  source = "content/spanish"
  target = "content"
  lang = "es"

# Share English publication pages into Spanish content tree.
# Exclude _index.md so the Spanish section title ("Publicaciones") is used.
[[mounts]]
  source = "content/english/publications"
  target = "content/publications"
  lang = "es"
  excludeFiles = "_index.md"
