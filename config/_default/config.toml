baseURL = "https://www.algarafa.com"
languageCode = "en"
DefaultContentLanguage = "en"
title = "Website of Rafael Álvarez García"
theme = "anatole-mod"
summarylength = 10
enableEmoji = true
enableRobotsTXT = true
publishDir = "docs"

# Enable Disqus
#disqusShortname = ""

# Google Analytics
#googleAnalytics = "UA-123-45"

# Syntax highlighting
pygmentsUseClasses = true   
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = false

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
        unsafe=true
        [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
            block = [['\\[', '\\]'], ['$$', '$$']]
            inline = [['\\(', '\\)']]

[taxonomies]
    category = "categories"
    series = "series"
    tag = "tags"
